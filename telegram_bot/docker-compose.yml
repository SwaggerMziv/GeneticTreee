services:
  telegram_bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-tiny}
    container_name: genetic_tree_bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
